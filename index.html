<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JourneyLog Campus AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    // Intercept WebXR session creation to inject DOM overlay BEFORE A-Frame requests the session
    if (navigator.xr) {
      const _requestSession = navigator.xr.requestSession.bind(navigator.xr);
      navigator.xr.requestSession = function(mode, options = {}) {
        if (mode === 'immersive-ar') {
          options.optionalFeatures = [...(options.optionalFeatures || []), 'dom-overlay'];
          options.domOverlay = { root: document.getElementById('hud') };
        }
        return _requestSession(mode, options);
      };
    }
  </script>
</head>
<body>
  <button id="enter-ar-btn">AR starten</button>

  <a-scene
    id="ar-scene"
    background="color: transparent"
    renderer="alpha: true; colorManagement: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay"
    embedded
    style="display:none">

    <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

    <!-- Wegpunkte werden per JS hier eingefügt -->
    <a-entity id="waypoints-root"></a-entity>
  </a-scene>

  <div id="hud" style="display:none">
    <!-- HUD oben -->
    <div class="hud-top">
      <div class="hud-row">
        <span class="hud-tour-name">🏔 HdM Campus Tour</span>
        <span class="hud-weather">⛅ 18°C &nbsp; ⚠️ Regen später</span>
      </div>
      <div class="hud-row hud-row-small">
        <span>↑ 384m</span>
        <span class="mode-toggle">
          <span class="mode-btn mode-active">🚶 Wandern</span>
          <span class="mode-btn">🚴 Rad</span>
        </span>
      </div>
    </div>

    <!-- HUD unten -->
    <div class="hud-bottom">
      <div class="hud-motivation" id="hud-motivator">🔥 Weiter so, du schaffst das!</div>
      <div class="hud-hydration">💧 Trinkpause fällig!</div>
      <div class="hud-progress-row">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:42%"></div>
        </div>
        <span class="progress-label">42% &nbsp;•&nbsp; 1,3 km verbleibend</span>
      </div>
      <div class="hud-poi-row">
        <span class="poi-badge">🏕 Raststätte</span>
        <span class="poi-badge">⛰ Würfel</span>
        <span class="poi-badge poi-inactive">🌊 –</span>
      </div>
    </div>

    <!-- Ecken-Markierungen (Quest-Look) -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
  </div>

  <script src="waypoints.js"></script>
  <script>
    // State
    const state = {
      userLat: null,
      userLng: null,
      heading: 0,
    };

    // Kompass
    function startCompass() {
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
      } else {
        window.addEventListener('deviceorientation', onOrientation, true);
      }
    }

    function onOrientation(e) {
      if (e.webkitCompassHeading != null) {
        state.heading = e.webkitCompassHeading;
      } else if (e.alpha != null) {
        state.heading = (360 - e.alpha) % 360;
      }
      updateWaypointPositions();
    }

    // GPS
    function startGPS() {
      navigator.geolocation.watchPosition(
        (pos) => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          updateWaypointPositions();
        },
        (err) => console.warn('GPS Fehler:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000 }
      );
    }

    function updateWaypointPositions() {
      if (state.userLat === null) return;
      WAYPOINTS.forEach((wp) => {
        const dist = haversineDistance(state.userLat, state.userLng, wp.lat, wp.lng);
        const bear = gpsBearing(state.userLat, state.userLng, wp.lat, wp.lng);
        const pos  = waypointToXRPosition(bear, state.heading);
        const el   = document.getElementById('wp-' + wp.name);
        if (el) {
          el.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
          const distEl = document.getElementById('wp-dist-' + wp.name);
          if (distEl) distEl.setAttribute('value', dist < 1000
            ? Math.round(dist) + 'm'
            : (dist / 1000).toFixed(1) + 'km');
        }
      });
    }

    function buildWaypointEntities() {
      const root = document.getElementById('waypoints-root');
      WAYPOINTS.forEach((wp) => {
        const entity = document.createElement('a-entity');
        entity.id = 'wp-' + wp.name;
        entity.setAttribute('position', '0 1.6 -4');

        const arrow = document.createElement('a-cone');
        arrow.setAttribute('color', '#64ffa0');
        arrow.setAttribute('height', '0.3');
        arrow.setAttribute('radius-bottom', '0.12');
        arrow.setAttribute('radius-top', '0');
        arrow.setAttribute('position', '0 0.3 0');
        arrow.setAttribute('animation', 'property: position; from: 0 0.2 0; to: 0 0.4 0; dur: 900; dir: alternate; loop: true; easing: easeInOutSine');
        entity.appendChild(arrow);

        const label = document.createElement('a-text');
        label.id = 'wp-label-' + wp.name;
        label.setAttribute('value', wp.icon + ' ' + wp.name);
        label.setAttribute('color', '#ffffff');
        label.setAttribute('align', 'center');
        label.setAttribute('position', '0 -0.1 0');
        label.setAttribute('scale', '1.2 1.2 1.2');
        entity.appendChild(label);

        const distLabel = document.createElement('a-text');
        distLabel.id = 'wp-dist-' + wp.name;
        distLabel.setAttribute('value', '-- m');
        distLabel.setAttribute('color', '#00e5ff');
        distLabel.setAttribute('align', 'center');
        distLabel.setAttribute('position', '0 -0.35 0');
        distLabel.setAttribute('scale', '0.9 0.9 0.9');
        entity.appendChild(distLabel);

        const bg = document.createElement('a-plane');
        bg.setAttribute('color', '#000000');
        bg.setAttribute('opacity', '0.5');
        bg.setAttribute('width', '1.2');
        bg.setAttribute('height', '0.6');
        bg.setAttribute('position', '0 -0.22 -0.01');
        entity.appendChild(bg);

        root.appendChild(entity);
      });
    }

    // Start
    document.getElementById('enter-ar-btn').addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
      buildWaypointEntities();
      // Pre-fill with fixed start position so arrows show immediately on Quest 2 (no GPS chip)
      state.userLat = START_POSITION.lat;
      state.userLng = START_POSITION.lng;
      updateWaypointPositions();
      startCompass();
      startGPS();
      const scene = document.getElementById('ar-scene');
      scene.style.display = 'block';
      document.getElementById('enter-ar-btn').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      scene.enterAR();
    });

    // Rotating motivator messages
    const MOTIVATIONS = [
      '🔥 Weiter so, du schaffst das!',
      '💪 Nur noch ein bisschen!',
      '🌟 Klasse Tempo!',
      '🏆 Du bist auf dem richtigen Weg!',
      '⚡ Fast da – nicht aufgeben!',
    ];
    let motivIdx = 0;
    function rotateMotivator() {
      const el = document.getElementById('hud-motivator');
      if (!el) return;
      motivIdx = (motivIdx + 1) % MOTIVATIONS.length;
      el.style.opacity = '0';
      setTimeout(() => {
        el.textContent = MOTIVATIONS[motivIdx];
        el.style.opacity = '1';
      }, 400);
    }
    setInterval(rotateMotivator, 15000);
  </script>
</body>
</html>
