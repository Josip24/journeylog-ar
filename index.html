<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JourneyLog Campus AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="enter-ar-btn">AR starten</button>

  <a-scene
    id="ar-scene"
    background="color: transparent"
    renderer="alpha: true; colorManagement: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay"
    embedded
    style="display:none">

    <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

    <!-- Wegpunkte werden per JS hier eingefügt -->
    <a-entity id="waypoints-root"></a-entity>
  </a-scene>

  <script src="waypoints.js"></script>
  <script>
    // State
    const state = {
      userLat: null,
      userLng: null,
      heading: 0,
    };

    // Kompass
    function startCompass() {
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
      } else {
        window.addEventListener('deviceorientation', onOrientation, true);
      }
    }

    function onOrientation(e) {
      if (e.webkitCompassHeading != null) {
        state.heading = e.webkitCompassHeading;
      } else if (e.alpha != null) {
        state.heading = (360 - e.alpha) % 360;
      }
      updateWaypointPositions();
    }

    // GPS
    function startGPS() {
      navigator.geolocation.watchPosition(
        (pos) => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          updateWaypointPositions();
        },
        (err) => console.warn('GPS Fehler:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000 }
      );
    }

    function updateWaypointPositions() {
      if (state.userLat === null) return;
      WAYPOINTS.forEach((wp) => {
        const dist = haversineDistance(state.userLat, state.userLng, wp.lat, wp.lng);
        const bear = gpsBearing(state.userLat, state.userLng, wp.lat, wp.lng);
        const pos  = waypointToXRPosition(bear, state.heading);
        const el   = document.getElementById('wp-' + wp.name);
        if (el) {
          el.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
          const distEl = document.getElementById('wp-dist-' + wp.name);
          if (distEl) distEl.setAttribute('value', dist < 1000
            ? Math.round(dist) + 'm'
            : (dist / 1000).toFixed(1) + 'km');
        }
      });
    }

    // Start
    document.getElementById('enter-ar-btn').addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
      startCompass();
      startGPS();
      const scene = document.getElementById('ar-scene');
      scene.style.display = 'block';
      document.getElementById('enter-ar-btn').style.display = 'none';
      scene.enterAR();
    });
  </script>
</body>
</html>
