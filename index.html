<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JourneyLog Campus AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    // Intercept WebXR session creation (dom-overlay removed; HUD is now A-Frame 3D entities)
    if (navigator.xr) {
      const _requestSession = navigator.xr.requestSession.bind(navigator.xr);
      navigator.xr.requestSession = function(mode, options = {}) {
        return _requestSession(mode, options);
      };
    }
  </script>
</head>
<body>
  <button id="enter-ar-btn">AR starten</button>

  <a-scene
    id="ar-scene"
    background="color: transparent"
    renderer="alpha: true; colorManagement: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay"
    embedded
    style="display:none">

    <a-camera id="camera" position="0 1.6 0" look-controls="enabled: false">

      <!-- HUD TOP: tour name + weather + altitude -->
      <a-entity id="hud-top" position="0 0.38 -1.0">
        <a-plane color="#000000" opacity="0.55" width="1.8" height="0.18" position="0 0 -0.01"></a-plane>
        <a-text id="hud-tour" value="HdM Campus Tour" color="#64ffa0" align="center" position="0 0.04 0" scale="0.13 0.13 0.13"></a-text>
        <a-text value="18°C  Regen später" color="#ffd166" align="center" position="0 -0.04 0" scale="0.10 0.10 0.10"></a-text>
        <a-text value="384m  •  Wandern / Rad" color="#aaaaaa" align="center" position="0 -0.11 0" scale="0.09 0.09 0.09"></a-text>
      </a-entity>

      <!-- HUD BOTTOM: motivator + progress + POI -->
      <a-entity id="hud-bottom" position="0 -0.38 -1.0">
        <a-plane color="#000000" opacity="0.55" width="1.8" height="0.22" position="0 0 -0.01"></a-plane>
        <a-text id="hud-motivator-3d" value="Weiter so, du schaffst das!" color="#ffd166" align="center" position="0 0.08 0" scale="0.10 0.10 0.10"></a-text>
        <a-text value="Trinkpause fällig!" color="#00e5ff" align="center" position="0 0 0" scale="0.09 0.09 0.09"></a-text>
        <a-text id="hud-progress" value="Fortschritt: 42%  •  1.3 km" color="#aaaaaa" align="center" position="0 -0.08 0" scale="0.09 0.09 0.09"></a-text>
        <a-text value="Raststätte  •  Würfel" color="#888888" align="center" position="0 -0.16 0" scale="0.08 0.08 0.08"></a-text>
      </a-entity>

      <!-- CORNER MARKERS (Quest look) -->
      <a-entity position="-0.85 0.48 -1.0">
        <a-plane color="#64ffa0" opacity="0.7" width="0.04" height="0.004" position="0.02 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.7" width="0.004" height="0.04" position="0 -0.02 0"></a-plane>
      </a-entity>
      <a-entity position="0.85 0.48 -1.0">
        <a-plane color="#64ffa0" opacity="0.7" width="0.04" height="0.004" position="-0.02 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.7" width="0.004" height="0.04" position="0 -0.02 0"></a-plane>
      </a-entity>
      <a-entity position="-0.85 -0.48 -1.0">
        <a-plane color="#64ffa0" opacity="0.7" width="0.04" height="0.004" position="0.02 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.7" width="0.004" height="0.04" position="0 0.02 0"></a-plane>
      </a-entity>
      <a-entity position="0.85 -0.48 -1.0">
        <a-plane color="#64ffa0" opacity="0.7" width="0.04" height="0.004" position="-0.02 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.7" width="0.004" height="0.04" position="0 0.02 0"></a-plane>
      </a-entity>

    </a-camera>

    <!-- Wegpunkte werden per JS hier eingefügt -->
    <a-entity id="waypoints-root"></a-entity>
  </a-scene>

  <script src="waypoints.js"></script>
  <script>
    // State
    const state = {
      userLat: null,
      userLng: null,
      heading: 0,
    };

    // Kompass
    function startCompass() {
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
      } else {
        window.addEventListener('deviceorientation', onOrientation, true);
      }
    }

    function onOrientation(e) {
      if (e.webkitCompassHeading != null) {
        state.heading = e.webkitCompassHeading;
      } else if (e.alpha != null) {
        state.heading = (360 - e.alpha) % 360;
      }
      updateWaypointPositions();
    }

    // GPS
    function startGPS() {
      navigator.geolocation.watchPosition(
        (pos) => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          updateWaypointPositions();
        },
        (err) => console.warn('GPS Fehler:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000 }
      );
    }

    function updateWaypointPositions() {
      if (state.userLat === null) return;

      // Navigation: 3 arrows + label pointing to Würfel
      const wurfel = WAYPOINTS.find(wp => wp.name === 'Würfel');
      const wurfelDist = haversineDistance(state.userLat, state.userLng, wurfel.lat, wurfel.lng);
      const wurfelBear = gpsBearing(state.userLat, state.userLng, wurfel.lat, wurfel.lng);
      [1, 2, 3].forEach((i) => {
        const pos = waypointToXRPosition(wurfelBear, state.heading, i * 1.8);
        const el = document.getElementById('nav-arrow-' + i);
        if (el) el.setAttribute('position', `${pos.x.toFixed(2)} 1.5 ${pos.z.toFixed(2)}`);
      });
      const wurfelEl = document.getElementById('wp-Würfel');
      if (wurfelEl) {
        const pos = waypointToXRPosition(wurfelBear, state.heading, 6);
        wurfelEl.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
        const distEl = document.getElementById('wp-dist-Würfel');
        if (distEl) distEl.setAttribute('value', wurfelDist < 1000 ? Math.round(wurfelDist) + 'm' : (wurfelDist/1000).toFixed(1) + 'km');
      }

      // POIs: Mensa + Lernwelt (label only, no arrows)
      ['Mensa', 'Lernwelt'].forEach((name) => {
        const wp = WAYPOINTS.find(w => w.name === name);
        const dist = haversineDistance(state.userLat, state.userLng, wp.lat, wp.lng);
        const bear = gpsBearing(state.userLat, state.userLng, wp.lat, wp.lng);
        const pos = waypointToXRPosition(bear, state.heading, 4);
        const el = document.getElementById('wp-' + name);
        if (el) {
          el.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
          const distEl = document.getElementById('wp-dist-' + name);
          if (distEl) distEl.setAttribute('value', dist < 1000 ? Math.round(dist) + 'm' : (dist/1000).toFixed(1) + 'km');
        }
      });
    }

    function buildWaypointEntities() {
      const root = document.getElementById('waypoints-root');

      // 3 navigation arrows toward Würfel
      [1, 2, 3].forEach((i) => {
        const container = document.createElement('a-entity');
        container.id = 'nav-arrow-' + i;
        container.setAttribute('position', '0 1.5 -' + (i * 1.8));
        const cone = document.createElement('a-cone');
        cone.setAttribute('color', '#64ffa0');
        cone.setAttribute('height', '0.22');
        cone.setAttribute('radius-bottom', '0.09');
        cone.setAttribute('radius-top', '0');
        cone.setAttribute('animation', `property: position; from: 0 0.05 0; to: 0 0.2 0; dur: ${800 + i * 120}; dir: alternate; loop: true; easing: easeInOutSine`);
        container.appendChild(cone);
        root.appendChild(container);
      });

      // Würfel: navigation target label
      const wurfelEntity = document.createElement('a-entity');
      wurfelEntity.id = 'wp-Würfel';
      wurfelEntity.setAttribute('position', '0 1.6 -6');
      const wurfelLabel = document.createElement('a-text');
      wurfelLabel.setAttribute('value', '>> WÜRFEL  ZIEL <<');
      wurfelLabel.setAttribute('color', '#64ffa0');
      wurfelLabel.setAttribute('align', 'center');
      wurfelLabel.setAttribute('position', '0 0.15 0');
      wurfelLabel.setAttribute('scale', '1.3 1.3 1.3');
      wurfelEntity.appendChild(wurfelLabel);
      const wurfelDist = document.createElement('a-text');
      wurfelDist.id = 'wp-dist-Würfel';
      wurfelDist.setAttribute('value', '-- m');
      wurfelDist.setAttribute('color', '#00e5ff');
      wurfelDist.setAttribute('align', 'center');
      wurfelDist.setAttribute('position', '0 -0.1 0');
      wurfelDist.setAttribute('scale', '1.0 1.0 1.0');
      wurfelEntity.appendChild(wurfelDist);
      const wurfelBg = document.createElement('a-plane');
      wurfelBg.setAttribute('color', '#001a00');
      wurfelBg.setAttribute('opacity', '0.65');
      wurfelBg.setAttribute('width', '1.5');
      wurfelBg.setAttribute('height', '0.5');
      wurfelBg.setAttribute('position', '0 0.02 -0.01');
      wurfelEntity.appendChild(wurfelBg);
      root.appendChild(wurfelEntity);

      // POI badges: Mensa + Lernwelt (label + distance, no arrow)
      [{ name: 'Mensa', icon: '🍽' }, { name: 'Lernwelt', icon: '📚' }].forEach((poi) => {
        const entity = document.createElement('a-entity');
        entity.id = 'wp-' + poi.name;
        entity.setAttribute('position', '0 1.6 -4');
        const label = document.createElement('a-text');
        label.setAttribute('value', poi.name);
        label.setAttribute('color', '#ffd166');
        label.setAttribute('align', 'center');
        label.setAttribute('position', '0 0.08 0');
        label.setAttribute('scale', '0.9 0.9 0.9');
        entity.appendChild(label);
        const distLabel = document.createElement('a-text');
        distLabel.id = 'wp-dist-' + poi.name;
        distLabel.setAttribute('value', '-- m');
        distLabel.setAttribute('color', '#aaaaaa');
        distLabel.setAttribute('align', 'center');
        distLabel.setAttribute('position', '0 -0.12 0');
        distLabel.setAttribute('scale', '0.8 0.8 0.8');
        entity.appendChild(distLabel);
        const bg = document.createElement('a-plane');
        bg.setAttribute('color', '#000000');
        bg.setAttribute('opacity', '0.45');
        bg.setAttribute('width', '1.0');
        bg.setAttribute('height', '0.38');
        bg.setAttribute('position', '0 0 -0.01');
        entity.appendChild(bg);
        root.appendChild(entity);
      });

    }

    // Start
    document.getElementById('enter-ar-btn').addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }
      buildWaypointEntities();
      // Pre-fill with fixed start position so arrows show immediately on Quest 2 (no GPS chip)
      state.userLat = START_POSITION.lat;
      state.userLng = START_POSITION.lng;
      updateWaypointPositions();
      startCompass();
      startGPS();
      const scene = document.getElementById('ar-scene');
      scene.style.display = 'block';
      document.getElementById('enter-ar-btn').style.display = 'none';
      scene.enterAR();
    });

    // Rotating motivator messages
    const MOTIVATIONS = [
      'Weiter so, du schaffst das!',
      'Nur noch ein bisschen!',
      'Klasse Tempo!',
      'Du bist auf dem richtigen Weg!',
      'Fast da – nicht aufgeben!',
    ];
    let motivIdx = 0;
    function rotateMotivator() {
      const el = document.getElementById('hud-motivator-3d');
      if (!el) return;
      motivIdx = (motivIdx + 1) % MOTIVATIONS.length;
      setTimeout(() => {
        el.setAttribute('value', MOTIVATIONS[motivIdx]);
      }, 400);
    }
    setInterval(rotateMotivator, 15000);
  </script>
</body>
</html>
