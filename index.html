<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JourneyLog Campus AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    // Critical fix: inject DOM overlay BEFORE A-Frame requests the WebXR session.
    // Quest 2 Browser supports dom-overlay – it must be in optionalFeatures
    // and the root element must already be visible in the DOM.
    if (navigator.xr) {
      const _req = navigator.xr.requestSession.bind(navigator.xr);
      navigator.xr.requestSession = function (mode, opts = {}) {
        if (mode === 'immersive-ar') {
          const hud = document.getElementById('hud');
          if (hud) {
            opts = Object.assign({}, opts);
            opts.optionalFeatures = Array.from(
              new Set([...(opts.optionalFeatures || []), 'dom-overlay'])
            );
            opts.domOverlay = { root: hud };
          }
        }
        return _req(mode, opts);
      };
    }
  </script>
</head>
<body>

  <!-- ── Start Screen ─────────────────────────────── -->
  <div id="start-screen">
    <div class="start-inner">
      <p class="start-brand">JourneyLog</p>
      <h1 class="start-title">Campus AR<br>Navigation</h1>
      <p class="start-sub">HdM Stuttgart · Nobelstraße 10</p>
      <button id="enter-ar-btn">AR starten</button>
      <p class="start-hint">Meta Quest 2 · WebXR Passthrough</p>
    </div>
  </div>

  <!-- ── DOM Overlay HUD ──────────────────────────── -->
  <!-- MUST be visible (display:block) before enterAR() is called -->
  <div id="hud">

    <!-- Top bar -->
    <div class="hud-top glass">
      <div class="hud-top-row">
        <div>
          <div class="hud-brand">JourneyLog</div>
          <div class="hud-route">HdM Campus Tour</div>
        </div>
        <div class="hud-chips">
          <span class="chip">18°C</span>
          <span class="chip">384m</span>
          <span class="chip chip-green">Wandern</span>
        </div>
      </div>
    </div>

    <!-- Quest-style corner markers -->
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <!-- Mini-map (canvas, offline – no map tiles) -->
    <div class="minimap-outer">
      <canvas id="minimap-canvas" width="200" height="200"></canvas>
    </div>

    <!-- Bottom bar -->
    <div class="hud-bottom glass">
      <div class="hud-bottom-row">
        <span class="hud-motivator" id="motivator-text">Weiter so, du schaffst das!</span>
        <span class="hud-hydration">Trinkpause fällig!</span>
      </div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill"></div></div>
        <span class="progress-pct">42%</span>
        <span class="progress-dist" id="dist-label">
          <span class="dist-value" id="dist-value">—</span> bis Würfel
        </span>
      </div>
    </div>

  </div><!-- #hud -->

  <!-- ── A-Frame scene (3D arrows + POI labels only) ── -->
  <a-scene
    id="ar-scene"
    background="color: transparent"
    renderer="alpha: true; colorManagement: true"
    webxr="requiredFeatures: local-floor"
    embedded
    style="display:none">
    <a-camera id="camera" position="0 1.6 0" look-controls="enabled: false"></a-camera>
    <a-entity id="waypoints-root"></a-entity>
  </a-scene>

  <script src="waypoints.js"></script>
  <script>
    /* ── State ─────────────────────────────────────── */
    const state = { userLat: null, userLng: null, heading: 0 };

    /* ── Mini-map (canvas, all data offline) ─────── */
    const mmCanvas = document.getElementById('minimap-canvas');
    const mmCtx    = mmCanvas.getContext('2d');
    const LAT0 = 48.7403, LAT1 = 48.7430;
    const LNG0 = 9.0992,  LNG1 = 9.1052;
    const MM_PAD = 18;
    const MM_WPS = [
      { name: 'Mensa',    lat: 48.74273,  lng: 9.10387,  c: '#ffd166' },
      { name: 'Würfel',   lat: 48.740751, lng: 9.100862, c: '#64ffa0' },
      { name: 'Start',    lat: 48.74215,  lng: 9.100572, c: '#00e5ff' },
      { name: 'Lernwelt', lat: 48.74116,  lng: 9.10202,  c: '#ffd166' },
    ];

    function toMap(lat, lng, W, H) {
      return {
        x: MM_PAD + (lng - LNG0) / (LNG1 - LNG0) * (W - MM_PAD * 2),
        y: (H - MM_PAD) - (lat - LAT0) / (LAT1 - LAT0) * (H - MM_PAD * 2),
      };
    }

    function drawMiniMap() {
      const W = 200, H = 200;
      const c = mmCtx;
      c.clearRect(0, 0, W, H);

      // Background
      c.fillStyle = 'rgba(0,6,14,0.92)';
      c.beginPath(); c.roundRect(0, 0, W, H, 10); c.fill();

      // Label
      c.fillStyle = '#64ffa0';
      c.font = 'bold 10px -apple-system, Arial, sans-serif';
      c.textAlign = 'left'; c.fillText('Campus', 10, 14);
      c.fillStyle = '#444'; c.textAlign = 'right'; c.fillText('N↑', W - 8, 14);

      // Waypoint dots + labels
      MM_WPS.forEach(wp => {
        const p = toMap(wp.lat, wp.lng, W, H);
        // Glow
        c.beginPath(); c.arc(p.x, p.y, 7, 0, Math.PI * 2);
        c.fillStyle = wp.c + '22'; c.fill();
        // Dot
        c.beginPath(); c.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        c.fillStyle = wp.c; c.fill();
        // Text
        c.fillStyle = wp.c;
        c.font = '9px -apple-system, Arial, sans-serif';
        c.textAlign = 'center';
        c.fillText(wp.name, p.x, p.y - 8);
      });

      // Live user position
      if (state.userLat !== null) {
        const p = toMap(state.userLat, state.userLng, W, H);
        c.beginPath(); c.arc(p.x, p.y, 7, 0, Math.PI * 2);
        c.fillStyle = 'rgba(255,255,255,0.18)'; c.fill();
        c.beginPath(); c.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        c.fillStyle = '#fff'; c.fill();
      }
    }

    /* ── Compass (circular low-pass – stops arrow jitter) ── */
    function startCompass() {
      const ev = 'ondeviceorientationabsolute' in window
        ? 'deviceorientationabsolute' : 'deviceorientation';
      window.addEventListener(ev, e => {
        let raw;
        if (e.webkitCompassHeading != null) raw = e.webkitCompassHeading;
        else if (e.alpha != null)            raw = (360 - e.alpha) % 360;
        else return;
        // Circular lerp: 85% previous + 15% new reading
        const pr = state.heading * Math.PI / 180;
        const cr = raw * Math.PI / 180;
        const x = Math.cos(pr) * 0.85 + Math.cos(cr) * 0.15;
        const y = Math.sin(pr) * 0.85 + Math.sin(cr) * 0.15;
        state.heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        updateWaypoints();
      }, true);
    }

    /* ── GPS ────────────────────────────────────────── */
    function startGPS() {
      navigator.geolocation.watchPosition(
        pos => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          updateWaypoints();
          drawMiniMap();
        },
        err => console.warn('GPS:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000 }
      );
    }

    /* ── Waypoint positioning ───────────────────────── */
    function updateWaypoints() {
      if (state.userLat === null) return;

      const wurfel = WAYPOINTS.find(w => w.name === 'Würfel');
      const wDist  = haversineDistance(state.userLat, state.userLng, wurfel.lat, wurfel.lng);
      const wBear  = gpsBearing(state.userLat, state.userLng, wurfel.lat, wurfel.lng);

      // Move 3 navigation arrows
      [1, 2, 3].forEach(i => {
        const pos = waypointToXRPosition(wBear, state.heading, i * 2.2);
        const el  = document.getElementById('nav-arrow-' + i);
        if (el) el.setAttribute('position', `${pos.x.toFixed(2)} 1.5 ${pos.z.toFixed(2)}`);
      });

      // Move Würfel label
      const wEl = document.getElementById('wp-Würfel');
      if (wEl) {
        const pos = waypointToXRPosition(wBear, state.heading, 6);
        wEl.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
      }
      const wDistEl = document.getElementById('wp-dist-Würfel');
      const distStr = wDist < 1000
        ? Math.round(wDist) + 'm'
        : (wDist / 1000).toFixed(1) + 'km';
      if (wDistEl) wDistEl.setAttribute('value', distStr);

      // Update HUD distance label (DOM overlay)
      const dv = document.getElementById('dist-value');
      if (dv) dv.textContent = distStr;

      // Move Mensa + Lernwelt
      ['Mensa', 'Lernwelt'].forEach(name => {
        const wp   = WAYPOINTS.find(w => w.name === name);
        const dist = haversineDistance(state.userLat, state.userLng, wp.lat, wp.lng);
        const bear = gpsBearing(state.userLat, state.userLng, wp.lat, wp.lng);
        const pos  = waypointToXRPosition(bear, state.heading, 4);
        const el   = document.getElementById('wp-' + name);
        if (el) el.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
        const dEl  = document.getElementById('wp-dist-' + name);
        if (dEl) dEl.setAttribute('value',
          dist < 1000 ? Math.round(dist) + 'm' : (dist / 1000).toFixed(1) + 'km');
      });
    }

    /* ── Build 3D A-Frame entities ──────────────────── */
    function buildWaypointEntities() {
      const root = document.getElementById('waypoints-root');

      // 3 navigation arrows pointing toward Würfel
      [1, 2, 3].forEach(i => {
        const g = document.createElement('a-entity');
        g.id = 'nav-arrow-' + i;
        g.setAttribute('position', `0 1.5 -${i * 2.2}`);

        // Shaft
        const shaft = document.createElement('a-cylinder');
        shaft.setAttribute('material', 'color:#64ffa0; emissive:#64ffa0; emissiveIntensity:0.45; shader:standard');
        shaft.setAttribute('height', '0.30');
        shaft.setAttribute('radius', '0.022');
        g.appendChild(shaft);

        // Arrowhead – scale-pulse only (no position change = no jump)
        const head = document.createElement('a-cone');
        head.setAttribute('material', 'color:#64ffa0; emissive:#64ffa0; emissiveIntensity:0.45; shader:standard');
        head.setAttribute('height', '0.17');
        head.setAttribute('radius-bottom', '0.078');
        head.setAttribute('radius-top', '0');
        head.setAttribute('position', '0 0.23 0');
        head.setAttribute('animation',
          `property:scale; from:0.9 0.9 0.9; to:1.22 1.22 1.22; dur:${580 + i * 130}; dir:alternate; loop:true; easing:easeInOutSine`);
        g.appendChild(head);

        // Glow ring at base
        const ring = document.createElement('a-torus');
        ring.setAttribute('material', 'color:#64ffa0; emissive:#64ffa0; emissiveIntensity:0.3; opacity:0.3; transparent:true; shader:standard');
        ring.setAttribute('radius', '0.12');
        ring.setAttribute('radius-tubular', '0.007');
        ring.setAttribute('rotation', '90 0 0');
        ring.setAttribute('animation',
          `property:opacity; from:0.12; to:0.5; dur:${750 + i * 100}; dir:alternate; loop:true`);
        g.appendChild(ring);

        root.appendChild(g);
      });

      // Würfel – destination label
      const wE = document.createElement('a-entity');
      wE.id = 'wp-Würfel';
      wE.setAttribute('position', '0 1.6 -6');

      const wBg = document.createElement('a-plane');
      wBg.setAttribute('material', 'color:#001a08; opacity:0.88; transparent:true');
      wBg.setAttribute('width', '2.0'); wBg.setAttribute('height', '0.62');
      wBg.setAttribute('position', '0 0 -0.01');
      wE.appendChild(wBg);

      const wTitle = document.createElement('a-text');
      wTitle.setAttribute('value', 'WÜRFEL  –  ZIEL');
      wTitle.setAttribute('color', '#64ffa0');
      wTitle.setAttribute('align', 'center');
      wTitle.setAttribute('position', '0 0.13 0');
      wTitle.setAttribute('scale', '1.8 1.8 1.8');
      wE.appendChild(wTitle);

      const wDist = document.createElement('a-text');
      wDist.id = 'wp-dist-Würfel';
      wDist.setAttribute('value', '— m');
      wDist.setAttribute('color', '#00e5ff');
      wDist.setAttribute('align', 'center');
      wDist.setAttribute('position', '0 -0.12 0');
      wDist.setAttribute('scale', '1.4 1.4 1.4');
      wE.appendChild(wDist);

      root.appendChild(wE);

      // Mensa + Lernwelt POI labels
      [{ name: 'Mensa' }, { name: 'Lernwelt' }].forEach(poi => {
        const e = document.createElement('a-entity');
        e.id = 'wp-' + poi.name;
        e.setAttribute('position', '0 1.6 -4');

        const bg = document.createElement('a-plane');
        bg.setAttribute('material', 'color:#0a0800; opacity:0.82; transparent:true');
        bg.setAttribute('width', '1.3'); bg.setAttribute('height', '0.48');
        bg.setAttribute('position', '0 0 -0.01');
        e.appendChild(bg);

        const lbl = document.createElement('a-text');
        lbl.setAttribute('value', poi.name);
        lbl.setAttribute('color', '#ffd166');
        lbl.setAttribute('align', 'center');
        lbl.setAttribute('position', '0 0.09 0');
        lbl.setAttribute('scale', '1.2 1.2 1.2');
        e.appendChild(lbl);

        const dlbl = document.createElement('a-text');
        dlbl.id = 'wp-dist-' + poi.name;
        dlbl.setAttribute('value', '— m');
        dlbl.setAttribute('color', '#888888');
        dlbl.setAttribute('align', 'center');
        dlbl.setAttribute('position', '0 -0.1 0');
        dlbl.setAttribute('scale', '0.95 0.95 0.95');
        e.appendChild(dlbl);

        root.appendChild(e);
      });
    }

    /* ── Motivator rotation ─────────────────────────── */
    const MOTIVATIONS = [
      'Weiter so, du schaffst das!',
      'Nur noch ein bisschen!',
      'Klasse Tempo, weiter!',
      'Du bist auf dem richtigen Weg!',
      'Fast da – nicht aufgeben!',
    ];
    let motivIdx = 0;
    const motivEl = document.getElementById('motivator-text');
    setInterval(() => {
      motivIdx = (motivIdx + 1) % MOTIVATIONS.length;
      if (motivEl) {
        motivEl.style.opacity = '0';
        setTimeout(() => {
          motivEl.textContent = MOTIVATIONS[motivIdx];
          motivEl.style.opacity = '1';
        }, 400);
      }
    }, 15000);

    /* ── Start button ───────────────────────────────── */
    document.getElementById('enter-ar-btn').addEventListener('click', async () => {
      // iOS permission for DeviceOrientation
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch (_) {}
      }

      buildWaypointEntities();

      // GPS fallback: Quest 2 has no GPS chip → start at Vorlesungssaal
      state.userLat = START_POSITION.lat;
      state.userLng = START_POSITION.lng;
      updateWaypoints();
      drawMiniMap();

      startCompass();
      startGPS();

      // ★ KEY FIX: show HUD BEFORE enterAR() so DOM overlay can latch onto it
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('hud').style.display = 'block';

      const scene = document.getElementById('ar-scene');
      scene.style.display = 'block';

      // Short pause so browser registers the visible #hud element,
      // then our interceptor attaches it as the dom-overlay root
      setTimeout(() => scene.enterAR(), 300);
    });
  </script>
</body>
</html>
