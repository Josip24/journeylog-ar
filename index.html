<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JourneyLog Campus AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="enter-ar-btn">AR starten</button>

  <!-- Hidden canvases – rendered as textures on A-Frame planes -->
  <canvas id="hud-top-canvas" width="512" height="90" style="display:none"></canvas>
  <canvas id="hud-bot-canvas" width="512" height="112" style="display:none"></canvas>
  <canvas id="minimap-canvas" width="256" height="256" style="display:none"></canvas>

  <a-scene
    id="ar-scene"
    background="color: transparent"
    renderer="alpha: true; colorManagement: true"
    webxr="requiredFeatures: local-floor"
    embedded
    style="display:none">

    <a-camera id="camera" position="0 1.6 0" look-controls="enabled: false">

      <!-- HUD TOP: canvas texture -->
      <a-plane id="hud-top-plane" position="0 0.33 -1.0"
        width="1.6" height="0.17"
        material="transparent: true; src: #hud-top-canvas; npot: true; shader: flat"></a-plane>

      <!-- HUD BOTTOM: canvas texture -->
      <a-plane id="hud-bot-plane" position="0 -0.34 -1.0"
        width="1.6" height="0.21"
        material="transparent: true; src: #hud-bot-canvas; npot: true; shader: flat"></a-plane>

      <!-- MINI-MAP bottom-right corner -->
      <a-plane id="minimap-plane" position="0.67 -0.24 -1.0"
        width="0.27" height="0.27"
        material="transparent: true; src: #minimap-canvas; npot: true; shader: flat"></a-plane>

      <!-- CORNER MARKERS (Quest look) -->
      <a-entity position="-0.76 0.45 -1.0">
        <a-plane color="#64ffa0" opacity="0.9" width="0.05" height="0.004" position="0.025 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.9" width="0.004" height="0.05" position="0 -0.025 0"></a-plane>
      </a-entity>
      <a-entity position="0.76 0.45 -1.0">
        <a-plane color="#64ffa0" opacity="0.9" width="0.05" height="0.004" position="-0.025 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.9" width="0.004" height="0.05" position="0 -0.025 0"></a-plane>
      </a-entity>
      <a-entity position="-0.76 -0.45 -1.0">
        <a-plane color="#64ffa0" opacity="0.9" width="0.05" height="0.004" position="0.025 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.9" width="0.004" height="0.05" position="0 0.025 0"></a-plane>
      </a-entity>
      <a-entity position="0.76 -0.45 -1.0">
        <a-plane color="#64ffa0" opacity="0.9" width="0.05" height="0.004" position="-0.025 0 0"></a-plane>
        <a-plane color="#64ffa0" opacity="0.9" width="0.004" height="0.05" position="0 0.025 0"></a-plane>
      </a-entity>

    </a-camera>

    <a-entity id="waypoints-root"></a-entity>
  </a-scene>

  <script src="waypoints.js"></script>
  <script>
    const state = { userLat: null, userLng: null, heading: 0 };

    // Canvas contexts
    const topCtx = document.getElementById('hud-top-canvas').getContext('2d');
    const botCtx = document.getElementById('hud-bot-canvas').getContext('2d');
    const mmCtx  = document.getElementById('minimap-canvas').getContext('2d');

    let motivIdx = 0;
    const MOTIVATIONS = [
      'Weiter so, du schaffst das!',
      'Nur noch ein bisschen!',
      'Klasse Tempo, weiter!',
      'Du bist auf dem richtigen Weg!',
      'Fast da – nicht aufgeben!',
    ];

    // ── Canvas helpers ──────────────────────────────────────────────────────
    function rr(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function pushTexture(id) {
      const el = document.getElementById(id);
      if (!el || !el.components || !el.components.material) return;
      const mat = el.components.material.material;
      if (mat && mat.map) mat.map.needsUpdate = true;
    }

    // ── HUD Top ─────────────────────────────────────────────────────────────
    function drawTop() {
      const c = topCtx, W = 512, H = 90;
      c.clearRect(0, 0, W, H);

      // Background
      c.fillStyle = 'rgba(0,0,0,0.75)';
      rr(c, 3, 3, W - 6, H - 6, 12); c.fill();

      // Green accent line top
      c.fillStyle = '#64ffa0';
      rr(c, 3, 3, W - 6, 3, 2); c.fill();

      // Tour name
      c.fillStyle = '#64ffa0';
      c.font = 'bold 24px Arial, Helvetica, sans-serif';
      c.textAlign = 'center';
      c.fillText('HdM Campus Tour', W / 2, 36);

      // Weather + stats
      c.fillStyle = '#ffd166';
      c.font = '16px Arial, Helvetica, sans-serif';
      c.fillText('18°C  •  Regen später  •  384m', W / 2, 60);

      // Mode label
      c.fillStyle = '#666666';
      c.font = '13px Arial, Helvetica, sans-serif';
      c.fillText('Wandern  /  Rad', W / 2, 80);

      pushTexture('hud-top-plane');
    }

    // ── HUD Bottom ───────────────────────────────────────────────────────────
    function drawBot(distLabel) {
      const c = botCtx, W = 512, H = 112;
      c.clearRect(0, 0, W, H);

      // Background
      c.fillStyle = 'rgba(0,0,0,0.75)';
      rr(c, 3, 3, W - 6, H - 6, 12); c.fill();

      // Motivator
      c.fillStyle = '#ffd166';
      c.font = 'bold 17px Arial, Helvetica, sans-serif';
      c.textAlign = 'center';
      c.fillText(MOTIVATIONS[motivIdx], W / 2, 24);

      // Hydration
      c.fillStyle = '#00e5ff';
      c.font = '14px Arial, Helvetica, sans-serif';
      c.fillText('Trinkpause fällig!', W / 2, 46);

      // Progress bar track
      const BAR_X = 28, BAR_Y = 58, BAR_W = W - 56, BAR_H = 11;
      c.fillStyle = '#2a2a2a';
      rr(c, BAR_X, BAR_Y, BAR_W, BAR_H, 5); c.fill();

      // Progress bar fill (42%)
      c.fillStyle = '#64ffa0';
      rr(c, BAR_X, BAR_Y, BAR_W * 0.42, BAR_H, 5); c.fill();

      // Progress text
      c.fillStyle = '#aaaaaa';
      c.font = '13px Arial, Helvetica, sans-serif';
      c.textAlign = 'left';
      c.fillText('42%', BAR_X, BAR_Y - 3);
      c.textAlign = 'right';
      c.fillText(distLabel || '-- m bis Würfel', W - BAR_X, BAR_Y - 3);

      // POI row
      c.fillStyle = '#555555';
      c.font = '12px Arial, Helvetica, sans-serif';
      c.textAlign = 'center';
      c.fillText('Raststätte  •  Würfel  •  Mensa', W / 2, 100);

      pushTexture('hud-bot-plane');
    }

    // ── Campus Mini-Map ──────────────────────────────────────────────────────
    // All waypoint positions are hardcoded here – works completely offline.
    const MAP_LAT_MIN = 48.7404, MAP_LAT_MAX = 48.7430;
    const MAP_LNG_MIN = 9.0993, MAP_LNG_MAX = 9.1050;
    const MAP_PAD = 28;

    function toMap(lat, lng) {
      const W = 256, H = 256;
      return {
        x: MAP_PAD + ((lng - MAP_LNG_MIN) / (MAP_LNG_MAX - MAP_LNG_MIN)) * (W - MAP_PAD * 2),
        y: (H - MAP_PAD) - ((lat - MAP_LAT_MIN) / (MAP_LAT_MAX - MAP_LAT_MIN)) * (H - MAP_PAD * 2),
      };
    }

    const MAP_WPS = [
      { name: 'Mensa',     lat: 48.74273, lng: 9.10387,  color: '#ffd166' },
      { name: 'Würfel',    lat: 48.740751, lng: 9.100862, color: '#64ffa0' },
      { name: 'Start',     lat: 48.74215, lng: 9.100572,  color: '#00e5ff' },
      { name: 'Lernwelt',  lat: 48.74116, lng: 9.10202,  color: '#ffd166' },
    ];

    function drawMiniMap() {
      const c = mmCtx, W = 256, H = 256;
      c.clearRect(0, 0, W, H);

      // Background
      c.fillStyle = 'rgba(0,8,18,0.88)';
      rr(c, 0, 0, W, H, 12); c.fill();

      // Border
      c.strokeStyle = '#64ffa0'; c.lineWidth = 1.5;
      rr(c, 1, 1, W - 2, H - 2, 12); c.stroke();

      // Title
      c.fillStyle = '#64ffa0';
      c.font = 'bold 11px Arial, sans-serif';
      c.textAlign = 'center';
      c.fillText('HdM Campus', W / 2, 15);

      // North label
      c.fillStyle = '#888888';
      c.font = '10px Arial, sans-serif';
      c.textAlign = 'right';
      c.fillText('N', W - 8, 15);

      // Simple campus path lines
      c.strokeStyle = 'rgba(100,255,160,0.15)';
      c.lineWidth = 8;
      c.lineCap = 'round';
      const pathPoints = [
        [48.74230, 9.09960], [48.74200, 9.10050],
        [48.74160, 9.10150], [48.74110, 9.10200],
      ];
      c.beginPath();
      pathPoints.forEach((p, i) => {
        const m = toMap(p[0], p[1]);
        i === 0 ? c.moveTo(m.x, m.y) : c.lineTo(m.x, m.y);
      });
      c.stroke();

      // Waypoints
      MAP_WPS.forEach(wp => {
        const p = toMap(wp.lat, wp.lng);
        // Outer glow
        c.beginPath();
        c.arc(p.x, p.y, 9, 0, Math.PI * 2);
        c.fillStyle = wp.color + '30';
        c.fill();
        // Dot
        c.beginPath();
        c.arc(p.x, p.y, 5, 0, Math.PI * 2);
        c.fillStyle = wp.color;
        c.fill();
        // Label
        c.fillStyle = wp.color;
        c.font = '10px Arial, sans-serif';
        c.textAlign = 'center';
        c.fillText(wp.name, p.x, p.y - 11);
      });

      // Live user position dot (falls GPS aktiv)
      if (state.userLat !== null) {
        const up = toMap(state.userLat, state.userLng);
        c.beginPath();
        c.arc(up.x, up.y, 7, 0, Math.PI * 2);
        c.fillStyle = 'rgba(255,255,255,0.25)';
        c.fill();
        c.beginPath();
        c.arc(up.x, up.y, 4, 0, Math.PI * 2);
        c.fillStyle = '#ffffff';
        c.fill();
      }

      pushTexture('minimap-plane');
    }

    // ── Compass (with circular low-pass smoothing to stop jitter) ───────────
    function startCompass() {
      const handler = 'ondeviceorientationabsolute' in window
        ? 'deviceorientationabsolute'
        : 'deviceorientation';
      window.addEventListener(handler, onOrientation, true);
    }

    function onOrientation(e) {
      let raw;
      if (e.webkitCompassHeading != null)  raw = e.webkitCompassHeading;
      else if (e.alpha != null)             raw = (360 - e.alpha) % 360;
      else return;

      // Circular smoothing: 85% old + 15% new – eliminates jitter
      const pr = state.heading * Math.PI / 180;
      const cr = raw * Math.PI / 180;
      const x = Math.cos(pr) * 0.85 + Math.cos(cr) * 0.15;
      const y = Math.sin(pr) * 0.85 + Math.sin(cr) * 0.15;
      state.heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      updateWaypoints();
    }

    // ── GPS ─────────────────────────────────────────────────────────────────
    function startGPS() {
      navigator.geolocation.watchPosition(
        pos => {
          state.userLat = pos.coords.latitude;
          state.userLng = pos.coords.longitude;
          updateWaypoints();
          drawMiniMap();
        },
        err => console.warn('GPS:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000 }
      );
    }

    // ── Waypoint positioning ─────────────────────────────────────────────────
    function updateWaypoints() {
      if (state.userLat === null) return;

      const wurfel = WAYPOINTS.find(w => w.name === 'Würfel');
      const wDist  = haversineDistance(state.userLat, state.userLng, wurfel.lat, wurfel.lng);
      const wBear  = gpsBearing(state.userLat, state.userLng, wurfel.lat, wurfel.lng);

      [1, 2, 3].forEach(i => {
        const pos = waypointToXRPosition(wBear, state.heading, i * 2.2);
        const el  = document.getElementById('nav-arrow-' + i);
        if (el) el.setAttribute('position', `${pos.x.toFixed(2)} 1.5 ${pos.z.toFixed(2)}`);
      });

      const wEl = document.getElementById('wp-Würfel');
      if (wEl) {
        const pos = waypointToXRPosition(wBear, state.heading, 6);
        wEl.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
      }
      const wDistEl = document.getElementById('wp-dist-Würfel');
      const distLabel = wDist < 1000
        ? Math.round(wDist) + 'm bis Würfel'
        : (wDist / 1000).toFixed(1) + 'km bis Würfel';
      if (wDistEl) wDistEl.setAttribute('value',
        wDist < 1000 ? Math.round(wDist) + 'm' : (wDist / 1000).toFixed(1) + 'km');

      drawBot(distLabel);

      ['Mensa', 'Lernwelt'].forEach(name => {
        const wp   = WAYPOINTS.find(w => w.name === name);
        const dist = haversineDistance(state.userLat, state.userLng, wp.lat, wp.lng);
        const bear = gpsBearing(state.userLat, state.userLng, wp.lat, wp.lng);
        const pos  = waypointToXRPosition(bear, state.heading, 4);
        const el   = document.getElementById('wp-' + name);
        if (el) {
          el.setAttribute('position', `${pos.x.toFixed(2)} ${pos.y} ${pos.z.toFixed(2)}`);
          const dEl = document.getElementById('wp-dist-' + name);
          if (dEl) dEl.setAttribute('value',
            dist < 1000 ? Math.round(dist) + 'm' : (dist / 1000).toFixed(1) + 'km');
        }
      });
    }

    // ── Build 3D waypoint entities ───────────────────────────────────────────
    function buildWaypointEntities() {
      const root = document.getElementById('waypoints-root');

      // 3 navigation arrows → Würfel
      [1, 2, 3].forEach(i => {
        const container = document.createElement('a-entity');
        container.id = 'nav-arrow-' + i;
        container.setAttribute('position', '0 1.5 -' + (i * 2.2));

        // Shaft
        const shaft = document.createElement('a-cylinder');
        shaft.setAttribute('color', '#64ffa0');
        shaft.setAttribute('height', '0.28');
        shaft.setAttribute('radius', '0.022');
        shaft.setAttribute('emission', '#64ffa0');
        shaft.setAttribute('emissive-intensity', '0.4');
        container.appendChild(shaft);

        // Arrowhead – pulse via scale (no position change → no jump)
        const cone = document.createElement('a-cone');
        cone.setAttribute('color', '#64ffa0');
        cone.setAttribute('height', '0.16');
        cone.setAttribute('radius-bottom', '0.075');
        cone.setAttribute('radius-top', '0');
        cone.setAttribute('position', '0 0.22 0');
        cone.setAttribute('animation',
          `property: scale; from: 1 1 1; to: 1.22 1.22 1.22; dur: ${650 + i * 130}; dir: alternate; loop: true; easing: easeInOutSine`);
        container.appendChild(cone);

        // Glow ring at base
        const ring = document.createElement('a-torus');
        ring.setAttribute('color', '#64ffa0');
        ring.setAttribute('radius', '0.11');
        ring.setAttribute('radius-tubular', '0.007');
        ring.setAttribute('rotation', '90 0 0');
        ring.setAttribute('opacity', '0.35');
        ring.setAttribute('animation',
          `property: opacity; from: 0.2; to: 0.55; dur: ${900 + i * 100}; dir: alternate; loop: true`);
        container.appendChild(ring);

        root.appendChild(container);
      });

      // Würfel target label
      const wEl = document.createElement('a-entity');
      wEl.id = 'wp-Würfel';
      wEl.setAttribute('position', '0 1.6 -6');

      const wBg = document.createElement('a-plane');
      wBg.setAttribute('color', '#001500');
      wBg.setAttribute('opacity', '0.82');
      wBg.setAttribute('width', '2.0');
      wBg.setAttribute('height', '0.62');
      wBg.setAttribute('position', '0 0 -0.01');
      wEl.appendChild(wBg);

      const wLabel = document.createElement('a-text');
      wLabel.setAttribute('value', 'WÜRFEL  –  ZIEL');
      wLabel.setAttribute('color', '#64ffa0');
      wLabel.setAttribute('align', 'center');
      wLabel.setAttribute('position', '0 0.13 0');
      wLabel.setAttribute('scale', '1.8 1.8 1.8');
      wEl.appendChild(wLabel);

      const wDist = document.createElement('a-text');
      wDist.id = 'wp-dist-Würfel';
      wDist.setAttribute('value', '-- m');
      wDist.setAttribute('color', '#00e5ff');
      wDist.setAttribute('align', 'center');
      wDist.setAttribute('position', '0 -0.12 0');
      wDist.setAttribute('scale', '1.3 1.3 1.3');
      wEl.appendChild(wDist);

      root.appendChild(wEl);

      // POI badges: Mensa + Lernwelt
      [{ name: 'Mensa' }, { name: 'Lernwelt' }].forEach(poi => {
        const el = document.createElement('a-entity');
        el.id = 'wp-' + poi.name;
        el.setAttribute('position', '0 1.6 -4');

        const bg = document.createElement('a-plane');
        bg.setAttribute('color', '#080800');
        bg.setAttribute('opacity', '0.78');
        bg.setAttribute('width', '1.3');
        bg.setAttribute('height', '0.48');
        bg.setAttribute('position', '0 0 -0.01');
        el.appendChild(bg);

        const lbl = document.createElement('a-text');
        lbl.setAttribute('value', poi.name);
        lbl.setAttribute('color', '#ffd166');
        lbl.setAttribute('align', 'center');
        lbl.setAttribute('position', '0 0.09 0');
        lbl.setAttribute('scale', '1.2 1.2 1.2');
        el.appendChild(lbl);

        const dlbl = document.createElement('a-text');
        dlbl.id = 'wp-dist-' + poi.name;
        dlbl.setAttribute('value', '-- m');
        dlbl.setAttribute('color', '#aaaaaa');
        dlbl.setAttribute('align', 'center');
        dlbl.setAttribute('position', '0 -0.1 0');
        dlbl.setAttribute('scale', '1.0 1.0 1.0');
        el.appendChild(dlbl);

        root.appendChild(el);
      });
    }

    // ── Start / enter AR ────────────────────────────────────────────────────
    document.getElementById('enter-ar-btn').addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch (_) {}
      }

      buildWaypointEntities();

      // GPS fallback: Quest 2 has no GPS chip – pre-fill with Vorlesungssaal
      state.userLat = START_POSITION.lat;
      state.userLng = START_POSITION.lng;

      startCompass();
      startGPS();
      updateWaypoints();

      // Draw canvases before scene init so textures load correctly
      drawTop();
      drawBot('-- m bis Würfel');
      drawMiniMap();

      const scene = document.getElementById('ar-scene');
      scene.style.display = 'block';
      document.getElementById('enter-ar-btn').style.display = 'none';

      // Give A-Frame time to bind canvas textures, then enter AR
      setTimeout(() => {
        drawTop();
        drawBot('-- m bis Würfel');
        drawMiniMap();
        scene.enterAR();
      }, 600);
    });

    // ── Motivator rotation every 15s ─────────────────────────────────────────
    setInterval(() => {
      motivIdx = (motivIdx + 1) % MOTIVATIONS.length;
      drawBot();
    }, 15000);
  </script>
</body>
</html>
